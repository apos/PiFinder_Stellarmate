<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PiFinder Setup</title>
<style>
  body {
    background: #111;
    color: #ddd;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 1.5rem;
  }
  h1 { font-size: 1.3rem; margin: 0 0 0.25rem; }
  .subtitle { color: #888; margin-bottom: 1.5rem; }
  #status {
    font-weight: bold;
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
    display: inline-block;
    margin-bottom: 1rem;
  }
  .status-idle { background: #333; color: #ccc; }
  .status-running { background: #1a3a5c; color: #7ec8ff; }
  .status-success { background: #1a4a2a; color: #7ee8a0; }
  .status-failed { background: #5c1a1a; color: #ff8f8f; }
  #choices button, #start-fresh {
    background: #2a6fdb;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 0.6rem 1.1rem;
    margin-right: 0.6rem;
    font-size: 0.95rem;
    cursor: pointer;
  }
  #choices button.danger { background: #a33; }
  #choices button.cancel { background: #444; }
  #choices button:hover, #start-fresh:hover { filter: brightness(1.15); }
  #log {
    background: #000;
    color: #b8f0b8;
    font-family: "SF Mono", Consolas, monospace;
    font-size: 0.85rem;
    padding: 1rem;
    border-radius: 6px;
    height: 60vh;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    margin-top: 1rem;
  }
</style>
</head>
<body>

<h1>PiFinder Setup</h1>
<div class="subtitle">pifinder_stellarmate_setup.sh &mdash; live status</div>

<div id="status" class="status-idle">Checking current state&hellip;</div>

<div id="choices" style="display:none;"></div>

<pre id="log" style="display:none;"></pre>

<script>
let logPosition = 0;
let polling = false;

function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = cls;
}

function showChoices(existingInstall) {
  const el = document.getElementById('choices');
  el.style.display = 'block';
  if (existingInstall) {
    el.innerHTML = `
      <p>An existing PiFinder installation was found. Choose an action:</p>
      <button onclick="start('reinstall')">Reinstall from scratch</button>
      <button onclick="start('update')">Update (git reset --hard)</button>
      <button class="cancel" onclick="start('cancel')">Cancel</button>
    `;
  } else {
    el.innerHTML = `
      <p>No existing installation found.</p>
      <button id="start-fresh" onclick="start('fresh')">Start Install</button>
    `;
  }
}

async function start(action) {
  document.getElementById('choices').style.display = 'none';
  setStatus('Starting…', 'status-running');
  const resp = await fetch('/start?action=' + encodeURIComponent(action), { method: 'POST' });
  const data = await resp.json();
  if (!data.started) {
    setStatus('Failed to start: ' + (data.error || 'unknown error'), 'status-failed');
    return;
  }
  document.getElementById('log').style.display = 'block';
  if (!polling) {
    polling = true;
    pollLog();
  }
}

async function pollLog() {
  const resp = await fetch('/log?position=' + logPosition);
  const data = await resp.json();
  if (data.lines.length > 0) {
    const logEl = document.getElementById('log');
    const atBottom = logEl.scrollTop + logEl.clientHeight >= logEl.scrollHeight - 20;
    logEl.textContent += data.lines.join('\n') + '\n';
    logPosition = data.position;
    if (atBottom) logEl.scrollTop = logEl.scrollHeight;
  }
  if (data.running) {
    setStatus('Running…', 'status-running');
    setTimeout(pollLog, 1000);
  } else {
    if (data.exit_code === 0) {
      setStatus('Success', 'status-success');
    } else if (data.exit_code === null) {
      setStatus('Idle', 'status-idle');
    } else {
      setStatus('Failed (exit code ' + data.exit_code + ')', 'status-failed');
    }
    polling = false;
  }
}

async function init() {
  const resp = await fetch('/state');
  const data = await resp.json();
  if (data.running) {
    document.getElementById('log').style.display = 'block';
    setStatus('Running…', 'status-running');
    polling = true;
    pollLog();
  } else if (data.exit_code !== null) {
    document.getElementById('log').style.display = 'block';
    logPosition = 0;
    pollLog();
    showChoices(data.existing_install);
  } else {
    setStatus('Idle', 'status-idle');
    showChoices(data.existing_install);
  }
}

init();
</script>

</body>
</html>
