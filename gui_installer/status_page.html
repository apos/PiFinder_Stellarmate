<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PiFinder on Stellarmate Setup</title>
<style>
  body {
    background: #111;
    color: #ddd;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 1.5rem;
  }
  .page {
    display: flex;
    align-items: flex-start;
    gap: 1.5rem;
  }
  .left-col {
    width: 40%;
    min-width: 280px;
    box-sizing: border-box;
  }
  .right-col {
    width: 60%;
    box-sizing: border-box;
  }
  h1 { font-size: 1.3rem; margin: 0 0 1rem; }
  .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; word-break: break-all; }
  #top-images {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  #header-image {
    display: block;
    width: 100%;
    max-width: 150px;
    height: auto;
    border-radius: 8px;
  }
  #pifinder-screen {
    display: block;
    width: 128px;
    height: 128px;
    image-rendering: pixelated;
    border-radius: 4px;
    background: #000;
    flex-shrink: 0;
  }
  #progress-wrap { margin-bottom: 0.8rem; }
  #progress-track {
    background: #262626;
    border-radius: 5px;
    height: 10px;
    overflow: hidden;
  }
  #progress-fill {
    background: #2a6fdb;
    height: 100%;
    width: 0%;
    transition: width 0.4s ease;
  }
  #progress-label {
    color: #999;
    font-size: 0.85rem;
    margin-top: 0.4rem;
  }
  #phase-checklist {
    list-style: none;
    margin: 0 0 1.2rem;
    padding: 0;
  }
  #phase-checklist li {
    padding: 0.15rem 0;
    font-size: 0.9rem;
    color: #666;
  }
  #phase-checklist li .icon {
    display: inline-block;
    width: 1.4em;
  }
  #phase-checklist li.done { color: #ccc; }
  #phase-checklist li.current { color: #ddd; font-weight: bold; }
  #status {
    font-weight: bold;
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
    display: inline-block;
    margin-bottom: 1rem;
  }
  .status-idle { background: #333; color: #ccc; }
  .status-running { background: #1a3a5c; color: #7ec8ff; }
  .status-success { background: #1a4a2a; color: #7ee8a0; }
  .status-failed { background: #5c1a1a; color: #ff8f8f; }
  .choice-card {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 1rem 1.2rem;
    margin-bottom: 0.8rem;
  }
  .choice-card h3 { margin: 0 0 0.3rem; font-size: 1.05rem; }
  .choice-card p { margin: 0 0 0.8rem; color: #aaa; font-size: 0.9rem; line-height: 1.4; }
  #choices button, #start-fresh {
    background: #2a6fdb;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 0.6rem 1.1rem;
    margin-right: 0.6rem;
    font-size: 0.95rem;
    cursor: pointer;
  }
  #choices button.danger { background: #a33; }
  #choices button.cancel { background: #444; }
  #choices button:hover, #start-fresh:hover { filter: brightness(1.15); }
  #log {
    background: #000;
    color: #b8f0b8;
    font-family: "SF Mono", Consolas, monospace;
    font-size: 0.85rem;
    padding: 1rem;
    border-radius: 6px;
    height: 60vh;
    width: 100%;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    box-sizing: border-box;
  }
  #reboot-wrap { margin-top: 1rem; display: none; }
  #reboot-button {
    background: #a33;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 0.6rem 1.1rem;
    font-size: 0.95rem;
    cursor: pointer;
  }
  #reboot-button:hover { filter: brightness(1.15); }
  #remote-links {
    font-size: 0.85rem;
    color: #999;
  }
  #remote-links a {
    color: #7ec8ff;
    text-decoration: none;
    margin-right: 1rem;
  }
  #remote-links a:hover { text-decoration: underline; }
  #docs-links {
    margin-top: 0.4rem;
    margin-bottom: 1.2rem;
    font-size: 0.85rem;
  }
  #docs-links a {
    color: #7ec8ff;
    text-decoration: none;
    margin-right: 1rem;
  }
  #docs-links a:hover { text-decoration: underline; }
  #footer-logos {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    margin-top: 1.5rem;
    opacity: 0.8;
  }
  #footer-logos:hover { opacity: 1; }
  #footer-logos img { height: 78px; width: auto; display: block; }
</style>
</head>
<body>

<h1>PiFinder on Stellarmate Setup</h1>

<div class="page">
  <div class="left-col">
    <div id="top-images">
      <img id="header-image" src="/pifinder.jpg" alt="PiFinder">
      <img id="pifinder-screen" src="/pifinder_welcome.png" alt="PiFinder screen" title="PiFinder OLED screen (live once running)">
    </div>

    <div class="subtitle" id="subtitle">live status</div>

    <div id="progress-wrap" style="display:none;">
      <div id="progress-track"><div id="progress-fill"></div></div>
      <div id="progress-label"></div>
    </div>

    <ul id="phase-checklist" style="display:none;"></ul>

    <div id="status" class="status-idle">Checking current state&hellip;</div>

    <div id="choices" style="display:none;"></div>

    <div id="reboot-wrap">
      <button id="reboot-button" onclick="reboot()">Reboot Now</button>
    </div>
  </div>

  <div class="right-col">
    <div id="remote-links"></div>
    <div id="docs-links">
      <a href="https://github.com/apos/PiFinder_Stellarmate#readme" target="_blank" rel="noopener">📖 Project docs</a>
      <a href="https://github.com/apos/PiFinder_Stellarmate/blob/main/Readme_PiFinder_LX200.md" target="_blank" rel="noopener">🔭 INDI / LX200 docs</a>
    </div>
    <pre id="log" style="display:none;"></pre>

    <div id="footer-logos">
      <a href="https://www.youtube.com/heyapos" target="_blank" rel="noopener" title="HeyApos on YouTube">
        <img src="/heyapos_logo.png" alt="HeyApos">
      </a>
      <a href="https://avvp.de" target="_blank" rel="noopener" title="avvp.de">
        <img src="/avvp_logo.png" alt="AVVP">
      </a>
    </div>
  </div>
</div>

<script>
let logPosition = 0;
let polling = false;
let phaseLabels = [];

function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = cls;
}

function updateProgress(phaseIndex, phaseTotal, phaseLabel) {
  const wrap = document.getElementById('progress-wrap');
  if (phaseIndex === null || phaseIndex < 0) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = 'block';
  const pct = Math.round(((phaseIndex + 1) / phaseTotal) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent =
    'Step ' + (phaseIndex + 1) + ' of ' + phaseTotal + ': ' + phaseLabel;
}

// Minimal checklist: a green check for finished steps, a construction icon
// for the one currently running, nothing (blank) for steps not reached yet.
// No animation — this just reflects the furthest phase marker seen so far.
function updateChecklist(phaseIndex, running, exitCode) {
  const el = document.getElementById('phase-checklist');
  if (phaseLabels.length === 0 || phaseIndex === null || phaseIndex < 0) {
    el.style.display = 'none';
    return;
  }
  el.style.display = 'block';
  const finishedRun = !running && exitCode === 0;
  el.innerHTML = phaseLabels.map((label, i) => {
    let icon = '';
    let cls = '';
    if (i < phaseIndex || (i === phaseIndex && finishedRun)) {
      icon = '✅';
      cls = 'done';
    } else if (i === phaseIndex) {
      icon = '🚧';
      cls = 'current';
    }
    return `<li class="${cls}"><span class="icon">${icon}</span>${label}</li>`;
  }).join('');
}

// Every non-loopback IP the server found on this machine, as clickable
// links, so this page can be reopened from another device on the network.
function renderRemoteLinks(ips, port) {
  const el = document.getElementById('remote-links');
  if (!ips || ips.length === 0) {
    el.innerHTML = '';
    return;
  }
  const links = ips.map(ip => {
    const url = `http://${ip}:${port}/`;
    return `<a href="${url}">${url}</a>`;
  }).join('');
  el.innerHTML = 'Reach this page from another device on the network:<br>' + links;
}

function showChoices(existingInstall) {
  const el = document.getElementById('choices');
  el.style.display = 'block';
  if (existingInstall) {
    el.innerHTML = `
      <p>An existing PiFinder installation was found at ~/PiFinder. Choose an action:</p>
      <div class="choice-card">
        <h3>Reinstall from scratch</h3>
        <p>Completely deletes the existing PiFinder directory and performs a fresh installation:
           clones PiFinder from the official <code>release</code> branch and re-applies all
           StellarMate patches. Use this if the installation is broken or you want a clean slate.</p>
        <button onclick="start('reinstall')">Reinstall from scratch</button>
      </div>
      <div class="choice-card">
        <h3>Update</h3>
        <p>Resets your local PiFinder to the official <code>release</code> branch version
           (<code>git reset --hard</code> + <code>pull</code>) and re-applies all patches. Keeps
           the existing directory, just brings the code up to date.</p>
        <button onclick="start('update')">Update (git reset --hard)</button>
      </div>
      <div class="choice-card">
        <h3>Cancel</h3>
        <p>Does nothing and exits &mdash; leaves the existing installation untouched.</p>
        <button class="cancel" onclick="start('cancel')">Cancel</button>
      </div>
    `;
  } else {
    el.innerHTML = `
      <div class="choice-card">
        <h3>No existing installation found</h3>
        <p>Clones PiFinder from the official <code>release</code> branch into ~/PiFinder and
           applies all StellarMate patches (INDI drivers, network fixes, etc.).</p>
        <button id="start-fresh" onclick="start('fresh')">Start Install</button>
      </div>
    `;
  }
}

async function start(action) {
  document.getElementById('choices').style.display = 'none';
  document.getElementById('reboot-wrap').style.display = 'none';
  setStatus('Starting…', 'status-running');
  const resp = await fetch('/start?action=' + encodeURIComponent(action), { method: 'POST' });
  const data = await resp.json();
  if (!data.started) {
    setStatus('Failed to start: ' + (data.error || 'unknown error'), 'status-failed');
    return;
  }
  // Server resets its log buffer for every new run — reset our read position
  // and the visible panel too, otherwise we'd keep polling from the previous
  // run's offset and silently miss everything up to that line count again.
  logPosition = 0;
  const logEl = document.getElementById('log');
  logEl.textContent = '';
  logEl.style.display = 'block';
  if (!polling) {
    polling = true;
    pollLog();
  }
}

async function reboot() {
  if (!confirm('Reboot the Pi now?')) return;
  const btn = document.getElementById('reboot-button');
  btn.disabled = true;
  btn.textContent = 'Rebooting…';
  const resp = await fetch('/reboot', { method: 'POST' });
  const data = await resp.json();
  if (!data.rebooting) {
    btn.disabled = false;
    btn.textContent = 'Reboot Now';
    alert('Could not reboot: ' + (data.error || 'unknown error'));
  }
}

async function pollLog() {
  const resp = await fetch('/log?position=' + logPosition);
  const data = await resp.json();
  if (data.lines.length > 0) {
    const logEl = document.getElementById('log');
    const atBottom = logEl.scrollTop + logEl.clientHeight >= logEl.scrollHeight - 20;
    logEl.textContent += data.lines.join('\n') + '\n';
    logPosition = data.position;
    if (atBottom) logEl.scrollTop = logEl.scrollHeight;
  }
  updateProgress(data.phase_index, data.phase_total, data.phase_label);
  updateChecklist(data.phase_index, data.running, data.exit_code);
  if (data.running) {
    setStatus('Running…', 'status-running');
    setTimeout(pollLog, 1000);
  } else {
    if (data.exit_code === 0) {
      setStatus('Success', 'status-success');
      if (data.reboot_needed === true) {
        document.getElementById('reboot-wrap').style.display = 'block';
      }
    } else if (data.exit_code === null) {
      setStatus('Idle', 'status-idle');
    } else {
      setStatus('Failed (exit code ' + data.exit_code + ')', 'status-failed');
    }
    polling = false;
  }
}

// Mirrors PiFinder's own live OLED screen (its /image endpoint) once PiFinder
// is actually running. Before that (or if it's unreachable), the <img> just
// keeps showing the static splash bitmap already set as its default src.
let pifinderScreenUrl = null;

function tryPiFinderScreenUrls(urls, index) {
  if (index >= urls.length) return; // none worked - static fallback stays as-is
  const probe = new Image();
  probe.onload = () => {
    pifinderScreenUrl = urls[index];
    refreshPiFinderScreen();
  };
  probe.onerror = () => tryPiFinderScreenUrls(urls, index + 1);
  probe.src = urls[index] + '?t=' + Date.now();
}

function refreshPiFinderScreen() {
  if (!pifinderScreenUrl) return;
  const probe = new Image();
  probe.onload = () => {
    document.getElementById('pifinder-screen').src = probe.src;
    setTimeout(refreshPiFinderScreen, 1000);
  };
  probe.onerror = () => {
    // PiFinder stopped responding - drop back to the static splash image.
    pifinderScreenUrl = null;
    document.getElementById('pifinder-screen').src = '/pifinder_welcome.png';
  };
  probe.src = pifinderScreenUrl + '?t=' + Date.now();
}

function initPiFinderScreen() {
  const host = location.hostname;
  tryPiFinderScreenUrls([`http://${host}/image`, `http://${host}:8080/image`], 0);
}

async function init() {
  initPiFinderScreen();
  const resp = await fetch('/state');
  const data = await resp.json();
  phaseLabels = data.phases || [];
  if (data.setup_script_path) {
    document.getElementById('subtitle').textContent = data.setup_script_path + ' — live status';
  }
  renderRemoteLinks(data.ips, data.port);
  updateProgress(data.phase_index, data.phase_total, data.phase_label);
  updateChecklist(data.phase_index, data.running, data.exit_code);
  if (data.running) {
    document.getElementById('log').style.display = 'block';
    setStatus('Running…', 'status-running');
    polling = true;
    pollLog();
  } else if (data.exit_code !== null) {
    document.getElementById('log').style.display = 'block';
    logPosition = 0;
    pollLog();
    showChoices(data.existing_install);
  } else {
    setStatus('Idle', 'status-idle');
    showChoices(data.existing_install);
  }
}

init();
</script>

</body>
</html>
